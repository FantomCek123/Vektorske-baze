services:
  chatbot-app:
    build: .
    container_name: taxi_driver_chatbot
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - qdrant-db
    restart: "on-failure:5"
    volumes:
      - chatbot_storage:/app/storage
      - hf_cache:/root/.cache/huggingface

  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: qdrant_local
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
  chatbot_storage:
  hf_cache: 